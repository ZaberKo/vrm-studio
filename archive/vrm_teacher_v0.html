<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟教师模型开发工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义滚动条样式，保持专业感 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* 隐藏原生 range 输入框的默认样式 */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px; width: 14px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            margin-top: -5px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            cursor: pointer;
            background: #334155;
            border-radius: 2px;
        }
        
        /* ThreeJS Canvas 容器 */
        #canvas-container { position: relative; width: 100%; height: 100%; outline: none; }
    </style>
    <!-- 严格遵照 @pixiv/three-vrm@3.0.0 官方文档的 Import Map 规范 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.0.0/lib/three-vrm.module.js",
                "@pixiv/three-vrm-animation": "https://unpkg.com/@pixiv/three-vrm-animation@3.0.0/lib/three-vrm-animation.module.js"
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-200 h-screen w-screen overflow-hidden flex flex-col text-sm font-sans">

    <!-- 顶部导航栏 -->
    <header class="bg-slate-950 border-b border-slate-800 h-12 flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-3">
            <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            <h1 class="font-bold text-lg tracking-wide">虚拟教师工作台 <span class="text-xs font-normal text-slate-500 ml-2">VRM Dev Studio (v3)</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="perf-stats" class="text-xs flex gap-3 text-slate-400 bg-slate-900 px-3 py-1 rounded border border-slate-800">
                <span>Draw Calls: <b id="stat-calls" class="text-blue-400">0</b></span>
                <span>Triangles: <b id="stat-tris" class="text-blue-400">0</b></span>
            </div>
            <button id="btn-export-img" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded transition shadow">
                高清截图 (PNG)
            </button>
        </div>
    </header>

    <!-- 主工作区 -->
    <main class="flex flex-1 overflow-hidden">
        
        <!-- 左侧面板：资产与场景 -->
        <aside class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0">
            <!-- 文件导入区 -->
            <div class="p-4 border-b border-slate-800">
                <h2 class="font-semibold text-slate-400 mb-3 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    模型与动作导入
                </h2>
                
                <label id="label-vrm" class="block w-full border-2 border-dashed border-slate-700 hover:border-blue-500 hover:bg-slate-800 transition rounded-lg p-4 text-center cursor-pointer mb-3">
                    <span class="text-slate-400 text-xs pointer-events-none">点击或拖拽上传 <b class="text-slate-200">.vrm</b> 模型</span>
                    <input type="file" id="file-vrm" accept=".vrm" class="hidden" />
                </label>
                
                <label id="label-vrma" class="block w-full border-2 border-dashed border-slate-700 hover:border-purple-500 hover:bg-slate-800 transition rounded-lg p-3 text-center cursor-pointer">
                    <span class="text-slate-400 text-xs pointer-events-none">上传 <b class="text-slate-200">.vrma</b> 动作</span>
                    <input type="file" id="file-vrma" accept=".vrma" class="hidden" />
                </label>
            </div>

            <!-- 元数据区 -->
            <div class="p-4 border-b border-slate-800 flex-1 overflow-y-auto">
                <h2 class="font-semibold text-slate-400 mb-2">模型元数据 (Meta)</h2>
                <div id="meta-container" class="space-y-2 text-xs text-slate-400">
                    <div class="p-2 bg-slate-800 rounded text-center">请先加载 VRM 模型</div>
                </div>
            </div>
            
            <!-- 骨骼结构树 (简化为下拉列表方便操作) -->
            <div class="p-4 bg-slate-950">
                <h2 class="font-semibold text-slate-400 mb-2">FK 姿势调整 (骨骼选择)</h2>
                <select id="bone-select" class="w-full bg-slate-800 border border-slate-700 rounded p-2 text-slate-200 outline-none focus:border-blue-500 mb-2 disabled:opacity-50" disabled>
                    <option value="">未加载模型...</option>
                </select>
                <div class="flex gap-2">
                    <button id="btn-reset-pose" class="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded py-1.5 transition disabled:opacity-50" disabled>重置 T-Pose</button>
                    <button id="btn-stop-anim" class="flex-1 bg-slate-800 hover:bg-red-900 border border-slate-700 rounded py-1.5 transition disabled:opacity-50 text-red-300" disabled>停止动作</button>
                </div>
                <p class="text-xs text-slate-500 mt-2">提示：选择骨骼后，在右侧3D视图中使用旋转控制轴进行调整。</p>
            </div>
        </aside>

        <!-- 中央视口 -->
        <div class="flex-1 relative flex flex-col min-w-0 bg-black">
            <!-- 视口工具栏 -->
            <div class="absolute top-4 left-4 z-10 flex gap-2">
                <button id="toggle-grid" class="bg-slate-900/80 hover:bg-slate-800 border border-slate-700 px-2 py-1 rounded shadow backdrop-blur text-xs flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-green-500" id="dot-grid"></span> 网格
                </button>
                <button id="toggle-axes" class="bg-slate-900/80 hover:bg-slate-800 border border-slate-700 px-2 py-1 rounded shadow backdrop-blur text-xs flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-green-500" id="dot-axes"></span> 坐标系
                </button>
            </div>
            
            <!-- 渲染容器 -->
            <div id="canvas-container" class="flex-1"></div>
            
            <!-- 日志控制台 -->
            <div class="h-32 bg-slate-950 border-t border-slate-800 p-2 overflow-y-auto font-mono text-xs" id="log-console">
                <div class="text-slate-500">系统初始化完成。等待加载模型...</div>
            </div>
        </div>

        <!-- 右侧面板：属性检查器 -->
        <aside class="w-80 bg-slate-900 border-l border-slate-800 flex flex-col shrink-0">
            <!-- 选项卡头部 -->
            <div class="flex border-b border-slate-800 bg-slate-950">
                <button class="flex-1 py-3 text-center border-b-2 border-blue-500 text-blue-400 font-semibold" id="tab-btn-expr">表情口型</button>
                <button class="flex-1 py-3 text-center border-b-2 border-transparent text-slate-500 hover:text-slate-300" id="tab-btn-env">环境配置</button>
            </div>

            <!-- 表情面板 (Blendshapes) -->
            <div id="tab-expr" class="flex-1 overflow-y-auto p-4 flex flex-col gap-6">
                <!-- 口型 Visemes -->
                <div>
                    <h3 class="font-semibold text-slate-300 mb-3 flex items-center gap-2">
                        <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        口型测试 (Visemes)
                    </h3>
                    <div id="viseme-sliders" class="space-y-3">
                        <div class="text-xs text-slate-500 italic">请先加载模型...</div>
                    </div>
                </div>

                <hr class="border-slate-800">

                <!-- 预设表情 -->
                <div>
                    <h3 class="font-semibold text-slate-300 mb-3 flex items-center gap-2">
                        <svg class="w-4 h-4 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        面部表情 (Expressions)
                    </h3>
                    <div id="expr-sliders" class="space-y-3">
                        <div class="text-xs text-slate-500 italic">请先加载模型...</div>
                    </div>
                </div>
            </div>

            <!-- 环境面板 (隐藏状态) -->
            <div id="tab-env" class="flex-1 overflow-y-auto p-4 flex flex-col gap-6 hidden">
                <div>
                    <h3 class="font-semibold text-slate-300 mb-3">背景设置</h3>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 text-slate-400">
                            <input type="radio" name="bg-type" value="default" checked class="text-blue-500"> 默认暗色
                        </label>
                        <label class="flex items-center gap-3 text-slate-400">
                            <input type="radio" name="bg-type" value="greenscreen" class="text-blue-500"> 绿幕 (用于抠图)
                        </label>
                        <label class="flex items-center gap-3 text-slate-400">
                            <input type="radio" name="bg-type" value="transparent" class="text-blue-500"> 透明背景
                        </label>
                    </div>
                </div>
                
                <hr class="border-slate-800">

                <div>
                    <h3 class="font-semibold text-slate-300 mb-3">灯光配置</h3>
                    <div class="space-y-4 text-slate-400">
                        <div>
                            <div class="flex justify-between mb-1">
                                <span>主光源强度</span>
                                <span id="val-light-intensity">1.0</span>
                            </div>
                            <input type="range" id="sl-light-intensity" min="0" max="3" step="0.1" value="1.0">
                        </div>
                        <div>
                            <span class="block mb-2">主光源颜色</span>
                            <input type="color" id="col-light" value="#ffffff" class="w-full h-8 bg-slate-800 border-none rounded cursor-pointer">
                        </div>
                    </div>
                </div>
            </div>
            
        </aside>
    </main>

    <!-- 全局加载遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur z-50 flex flex-col items-center justify-center hidden">
        <svg class="animate-spin -ml-1 mr-3 h-10 w-10 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <div id="loading-text" class="text-lg font-semibold tracking-wide animate-pulse">正在解析模型数据...</div>
    </div>

    <!-- 添加全局错误捕获，避免崩溃时静默失败 -->
    <script>
        window.addEventListener('error', function(event) {
            const logConsole = document.getElementById('log-console');
            if (logConsole) {
                const el = document.createElement('div');
                const time = new Date().toLocaleTimeString();
                el.innerHTML = `<span class="text-slate-600">[${time}]</span> <span class="text-red-400">[系统错误] ${event.message}</span>`;
                logConsole.appendChild(el);
                logConsole.scrollTop = logConsole.scrollHeight;
            }
        });
    </script>

    <script type="module">
        // --- 系统控制与日志劫持 ---
        const logConsole = document.getElementById('log-console');
        function addLog(msg, type = 'info') {
            const el = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            el.innerHTML = `<span class="text-slate-600">[${time}]</span> <span class="${type === 'error' ? 'text-red-400' : (type === 'warn' ? 'text-yellow-400' : 'text-slate-300')}">${msg}</span>`;
            logConsole.appendChild(el);
            logConsole.scrollTop = logConsole.scrollHeight;
        }
        
        // --- 动态加载依赖架构 (v3) ---
        let THREE, GLTFLoader, OrbitControls, TransformControls, Stats, VRMLoaderPlugin, VRMUtils, VRMAnimationLoaderPlugin;
        
        // --- 核心变量 ---
        const container = document.getElementById('canvas-container');
        let scene, camera, renderer, orbitControls, transformControl, stats;
        let currentVrm = null;
        let currentMixer = null;
        let clock;
        
        // 光源与辅助对象
        let mainLight, ambientLight;
        let gridHelper, axesHelper;

        // UI 元素
        const uiStatsCalls = document.getElementById('stat-calls');
        const uiStatsTris = document.getElementById('stat-tris');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        async function bootstrap() {
            try {
                addLog('开始拉取 3D 引擎依赖 (v3.0)...', 'warn');
                
                THREE = await import('three');
                addLog('Three.js 核心库加载成功。');
                
                const loaders = await import('three/addons/loaders/GLTFLoader.js');
                GLTFLoader = loaders.GLTFLoader;
                
                const controls1 = await import('three/addons/controls/OrbitControls.js');
                OrbitControls = controls1.OrbitControls;
                
                const controls2 = await import('three/addons/controls/TransformControls.js');
                TransformControls = controls2.TransformControls;
                
                const statsModule = await import('three/addons/libs/stats.module.js');
                Stats = statsModule.default;

                const vrmModule = await import('@pixiv/three-vrm');
                VRMLoaderPlugin = vrmModule.VRMLoaderPlugin;
                VRMUtils = vrmModule.VRMUtils;

                // v3 版本的动画插件变更为类导出
                const vrmaModule = await import('@pixiv/three-vrm-animation');
                VRMAnimationLoaderPlugin = vrmaModule.VRMAnimationLoaderPlugin;
                
                addLog('所有依赖库下载完毕，开始初始化渲染...', 'info');
                clock = new THREE.Clock();
                init();
            } catch (err) {
                console.error("加载依赖库失败:", err);
                addLog(`网络加载库失败！错误: ${err.message}`, 'error');
                container.innerHTML = `<div class="p-10 text-red-400 font-bold text-base flex flex-col gap-4">
                    <p>引擎加载失败！</p>
                    <p class="text-sm font-normal text-slate-400">因为模块加载是在后台进行的，当 CDN (资源服务器) 被墙或响应过慢时，会导致页面完全无响应（黑屏且无法上传模型）。</p>
                    <p class="text-sm font-normal text-slate-400">错误详情: ${err.message}</p>
                </div>`;
            }
        }

        // --- 初始化 Three.js ---
        function init() {
            // 1. 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e293b);

            // 2. 相机
            camera = new THREE.PerspectiveCamera(30, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 1.3, -3); 

            // 3. 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            // 4. 控制器
            orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.target.set(0, 1.3, 0);
            orbitControls.update();

            // 5. 辅助工具 (TransformControls)
            transformControl = new TransformControls(camera, renderer.domElement);
            transformControl.setMode('rotate'); 
            // 【关键优化】设置 space 为 local，方便通过骨骼自身坐标系进行微调 (FK)
            transformControl.setSpace('local');
            transformControl.addEventListener('dragging-changed', (event) => {
                orbitControls.enabled = !event.value; 
            });
            scene.add(transformControl);

            // 6. 灯光
            ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
            mainLight.position.set(1, 2, -2).normalize();
            scene.add(mainLight);

            // 7. 网格与坐标系
            gridHelper = new THREE.GridHelper(10, 10, 0x475569, 0x334155);
            scene.add(gridHelper);
            axesHelper = new THREE.AxesHelper(2);
            axesHelper.position.y = 0.01;
            scene.add(axesHelper);

            // 8. 性能面板
            stats = new Stats();
            stats.dom.style.position = 'absolute';
            stats.dom.style.top = '10px';
            stats.dom.style.right = '10px';
            stats.dom.style.left = 'auto';
            container.appendChild(stats.dom);

            window.addEventListener('resize', onWindowResize);
            animate();
            addLog('Three.js 核心渲染管线初始化完毕。');
            
            bindEvents();
        }

        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // --- 加载 VRM 模型 ---
        function loadVRM(url) {
            showLoading("解析 VRM 模型中...");
            addLog("开始加载 VRM 文件...");

            const loader = new GLTFLoader();
            // v3 API 规范：实例化 VRMLoaderPlugin
            loader.register((parser) => {
                return new VRMLoaderPlugin(parser);
            });

            loader.load(
                url,
                (gltf) => {
                    try {
                        const vrm = gltf.userData.vrm;
                        if (!vrm) {
                            addLog("加载失败：这不是一个有效的 VRM 模型。", 'error');
                            hideLoading();
                            return;
                        }

                        // 清理旧模型
                        if (currentVrm) {
                            scene.remove(currentVrm.scene);
                            transformControl.detach();
                            if (currentMixer) {
                                currentMixer.stopAllAction();
                                currentMixer = null;
                            }
                            currentVrm.dispose();
                        }

                        currentVrm = vrm;
                        
                        try {
                            VRMUtils.removeUnnecessaryVertices(gltf.scene);
                            VRMUtils.removeUnnecessaryJoints(gltf.scene);
                        } catch (optErr) {
                            console.warn("VRM优化警告:", optErr);
                        }

                        // 禁用视锥剔除，防止动作导致网格消失
                        vrm.scene.traverse((obj) => {
                            obj.frustumCulled = false;
                        });

                        // 旋转模型面向摄像机
                        vrm.scene.rotation.y = Math.PI;

                        scene.add(vrm.scene);
                        
                        buildMetaUI(vrm.meta);
                        buildExpressionsUI(vrm.expressionManager);
                        buildBoneSelector(vrm.humanoid);

                        addLog("VRM 模型加载成功！包含面数: " + renderer.info.render.triangles);
                        
                        document.getElementById('bone-select').disabled = false;
                        document.getElementById('btn-reset-pose').disabled = false;
                        
                        hideLoading();
                    } catch (err) {
                        console.error(err);
                        addLog("模型解析处理出错: " + err.message, 'error');
                        hideLoading();
                    }
                },
                (progress) => {
                    if (progress.total > 0) {
                        const pct = ((progress.loaded / progress.total) * 100).toFixed(1);
                        loadingText.innerText = `加载模型中... ${pct}%`;
                    }
                },
                (error) => {
                    console.error(error);
                    addLog("模型加载失败: " + error.message, 'error');
                    hideLoading();
                }
            );
        }

        // --- 加载 VRMA 动画 ---
        function loadVRMA(url) {
            if (!currentVrm) {
                alert("请先加载一个 VRM 模型！");
                return;
            }
            showLoading("解析 VRMA 动作文件中...");
            addLog("开始加载动画文件...");

            const loader = new GLTFLoader();
            // v3 API 规范：实例化 VRMAnimationLoaderPlugin
            loader.register((parser) => {
                return new VRMAnimationLoaderPlugin(parser);
            });

            loader.load(url, (gltf) => {
                try {
                    const vrmAnimations = gltf.userData.vrmAnimations;
                    if (!vrmAnimations || vrmAnimations.length === 0) {
                        addLog("未找到有效的 VRMA 动画数据。", 'error');
                        hideLoading();
                        return;
                    }

                    const vrmAnimation = vrmAnimations[0]; 
                    
                    // 【v3 核心修复】必须通过 createAnimationClip 生成针对当前模型的 Clip 实例
                    const clip = vrmAnimation.createAnimationClip(currentVrm);
                    
                    // 重置状态
                    transformControl.detach();
                    if(currentMixer) currentMixer.stopAllAction();

                    currentMixer = new THREE.AnimationMixer(currentVrm.scene);
                    const action = currentMixer.clipAction(clip);
                    action.play();

                    document.getElementById('btn-stop-anim').disabled = false;
                    addLog("VRMA 动画加载并播放成功！");
                    hideLoading();
                } catch(err) {
                    console.error(err);
                    addLog("动作绑定失败: " + err.message, 'error');
                    hideLoading();
                }
            }, undefined, (error) => {
                console.error(error);
                addLog("动画加载失败: " + error.message, 'error');
                hideLoading();
            });
        }

        // --- UI 构建方法 ---

        // 构建元数据面板 (动态兼容 VRM0.0 / VRM1.0)
        function buildMetaUI(meta) {
            const container = document.getElementById('meta-container');
            if(!meta) {
                container.innerHTML = '<div class="text-slate-500">此模型无元数据。</div>';
                return;
            }
            
            let html = '';
            // 动态遍历所有字段，避免写死导致版本字段差异读取不到
            for (const [key, val] of Object.entries(meta)) {
                if (val && (typeof val === 'string' || typeof val === 'number' || typeof val === 'boolean')) {
                    html += `
                    <div class="bg-slate-800 p-2 rounded flex flex-col mb-1">
                        <span class="text-[10px] text-slate-500 uppercase">${key}</span>
                        <span class="text-slate-200 font-medium truncate" title="${val}">${val}</span>
                    </div>`;
                } else if (Array.isArray(val) && val.length > 0) {
                    const strVal = val.join(', ');
                    html += `
                    <div class="bg-slate-800 p-2 rounded flex flex-col mb-1">
                        <span class="text-[10px] text-slate-500 uppercase">${key}</span>
                        <span class="text-slate-200 font-medium truncate" title="${strVal}">${strVal}</span>
                    </div>`;
                }
            }
            container.innerHTML = html || '<div class="text-slate-500">元数据不完整。</div>';
        }

        // 构建表情和口型滑动条
        function buildExpressionsUI(exprManager) {
            const exprContainer = document.getElementById('expr-sliders');
            const visemeContainer = document.getElementById('viseme-sliders');
            exprContainer.innerHTML = '';
            visemeContainer.innerHTML = '';

            if(!exprManager || !exprManager.expressions) return;

            const visemeNames = ['aa', 'ih', 'ou', 'ee', 'oh', 'a', 'i', 'u', 'e', 'o'];
            
            exprManager.expressions.forEach((expr) => {
                // v3 中使用 name 获取表情名称
                const name = expr.name || expr.expressionName; 
                if(!name) return;
                
                const isViseme = visemeNames.includes(name.toLowerCase());
                
                const wrapper = document.createElement('div');
                wrapper.innerHTML = `
                    <div class="flex justify-between mb-1 text-xs">
                        <span class="text-slate-300 font-medium capitalize">${name}</span>
                        <span id="val-${name}" class="text-slate-500">0%</span>
                    </div>
                    <input type="range" min="0" max="1" step="0.01" value="0" data-expr="${name}" class="expr-slider">
                `;
                
                if (isViseme) {
                    visemeContainer.appendChild(wrapper);
                } else {
                    exprContainer.appendChild(wrapper);
                }
            });

            document.querySelectorAll('.expr-slider').forEach(slider => {
                slider.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    const name = e.target.getAttribute('data-expr');
                    document.getElementById(`val-${name}`).innerText = Math.round(val * 100) + '%';
                    
                    if (currentVrm) {
                        currentVrm.expressionManager.setValue(name, val);
                    }
                });
            });

            if (visemeContainer.innerHTML === '') visemeContainer.innerHTML = '<div class="text-xs text-slate-500">未检测到标准口型映射</div>';
            if (exprContainer.innerHTML === '') exprContainer.innerHTML = '<div class="text-xs text-slate-500">未检测到面部表情映射</div>';
        }

        // 构建骨骼选择器用于 FK
        function buildBoneSelector(humanoid) {
            const select = document.getElementById('bone-select');
            select.innerHTML = '<option value="">-- 选择骨骼进入手捏模式 --</option>';
            
            const bones = humanoid.humanBones;
            Object.keys(bones).sort().forEach(boneName => {
                if (bones[boneName]) {
                    const opt = document.createElement('option');
                    opt.value = boneName;
                    opt.innerText = boneName;
                    select.appendChild(opt);
                }
            });

            select.addEventListener('change', (e) => {
                const boneName = e.target.value;
                if (!boneName || !currentVrm) {
                    transformControl.detach();
                    return;
                }
                const boneNode = currentVrm.humanoid.getNormalizedBoneNode(boneName);
                if (boneNode) {
                    transformControl.attach(boneNode);
                    addLog(`选中骨骼: ${boneName}，可直接在 3D 视图中旋转拖拽。`);
                }
            });
        }

        // --- 渲染循环 ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // 更新动画混合器 (动作)
            if (currentMixer) {
                currentMixer.update(delta);
            }

            // 更新 VRM (应用表情、物理、视线等)
            if (currentVrm) {
                currentVrm.update(delta);
            }

            // 更新渲染
            renderer.render(scene, camera);
            if (stats) stats.update();

            // 更新自定义性能面板
            uiStatsCalls.innerText = renderer.info.render.calls;
            uiStatsTris.innerText = renderer.info.render.triangles;
        }

        // --- UI 交互与工具函数 ---
        
        function showLoading(msg) {
            loadingText.innerText = msg;
            loadingOverlay.classList.remove('hidden');
        }
        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }

        // --- 文件拖拽与事件绑定 ---
        function bindEvents() {
            function setupDragAndDrop(labelId, inputElement, loadFunction) {
                const label = document.getElementById(labelId);
                if(!label) return;
                
                label.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    label.classList.add('border-blue-500', 'bg-slate-800');
                });
                label.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    label.classList.remove('border-blue-500', 'bg-slate-800');
                });
                label.addEventListener('drop', (e) => {
                    e.preventDefault();
                    label.classList.remove('border-blue-500', 'bg-slate-800');
                    const file = e.dataTransfer.files[0];
                    if (file) {
                        const url = URL.createObjectURL(file);
                        loadFunction(url);
                        if(inputElement) inputElement.value = ''; 
                    }
                });
            }
            setupDragAndDrop('label-vrm', document.getElementById('file-vrm'), loadVRM);
            setupDragAndDrop('label-vrma', document.getElementById('file-vrma'), loadVRMA);

            document.getElementById('file-vrm').addEventListener('change', (e) => {
                try {
                    const file = e.target.files[0];
                    if(!file) return;
                    const url = URL.createObjectURL(file);
                    loadVRM(url);
                    e.target.value = ''; 
                } catch(err) {
                    addLog("处理文件出错: " + err.message, 'error');
                }
            });

            document.getElementById('file-vrma').addEventListener('change', (e) => {
                try {
                    const file = e.target.files[0];
                    if(!file) return;
                    const url = URL.createObjectURL(file);
                    loadVRMA(url);
                    e.target.value = ''; 
                } catch(err) {
                    addLog("处理文件出错: " + err.message, 'error');
                }
            });

            document.getElementById('btn-stop-anim').addEventListener('click', () => {
                if (currentMixer) {
                    currentMixer.stopAllAction();
                    document.getElementById('btn-stop-anim').disabled = true;
                    addLog("已停止动作播放。");
                }
            });

            document.getElementById('btn-reset-pose').addEventListener('click', () => {
                if (currentVrm) {
                    currentVrm.humanoid.resetPose();
                    if(currentMixer) {
                            currentMixer.stopAllAction();
                            document.getElementById('btn-stop-anim').disabled = true;
                    }
                    transformControl.detach();
                    document.getElementById('bone-select').value = "";
                    addLog("模型姿势已重置。");
                }
            });

            document.getElementById('toggle-grid').addEventListener('click', (e) => {
                gridHelper.visible = !gridHelper.visible;
                document.getElementById('dot-grid').className = gridHelper.visible ? "w-2 h-2 rounded-full bg-green-500" : "w-2 h-2 rounded-full bg-slate-600";
            });
            document.getElementById('toggle-axes').addEventListener('click', (e) => {
                axesHelper.visible = !axesHelper.visible;
                document.getElementById('dot-axes').className = axesHelper.visible ? "w-2 h-2 rounded-full bg-green-500" : "w-2 h-2 rounded-full bg-slate-600";
            });

            const tabBtnExpr = document.getElementById('tab-btn-expr');
            const tabBtnEnv = document.getElementById('tab-btn-env');
            const tabExpr = document.getElementById('tab-expr');
            const tabEnv = document.getElementById('tab-env');

            tabBtnExpr.addEventListener('click', () => {
                tabExpr.classList.remove('hidden'); tabEnv.classList.add('hidden');
                tabBtnExpr.className = "flex-1 py-3 text-center border-b-2 border-blue-500 text-blue-400 font-semibold";
                tabBtnEnv.className = "flex-1 py-3 text-center border-b-2 border-transparent text-slate-500 hover:text-slate-300";
            });
            tabBtnEnv.addEventListener('click', () => {
                tabEnv.classList.remove('hidden'); tabExpr.classList.add('hidden');
                tabBtnEnv.className = "flex-1 py-3 text-center border-b-2 border-blue-500 text-blue-400 font-semibold";
                tabBtnExpr.className = "flex-1 py-3 text-center border-b-2 border-transparent text-slate-500 hover:text-slate-300";
            });

            document.querySelectorAll('input[name="bg-type"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const val = e.target.value;
                    if(val === 'default') {
                        scene.background = new THREE.Color(0x1e293b);
                        renderer.setClearAlpha(1);
                    } else if (val === 'greenscreen') {
                        scene.background = new THREE.Color(0x00FF00);
                        renderer.setClearAlpha(1);
                    } else {
                        scene.background = null;
                        renderer.setClearAlpha(0);
                    }
                });
            });

            document.getElementById('sl-light-intensity').addEventListener('input', (e) => {
                mainLight.intensity = parseFloat(e.target.value);
                document.getElementById('val-light-intensity').innerText = mainLight.intensity.toFixed(1);
            });
            
            document.getElementById('col-light').addEventListener('input', (e) => {
                mainLight.color.set(e.target.value);
            });

            document.getElementById('btn-export-img').addEventListener('click', () => {
                if (!currentVrm) {
                    alert("请先加载模型！");
                    return;
                }
                const prevGrid = gridHelper.visible;
                const prevAxes = axesHelper.visible;
                
                gridHelper.visible = false;
                axesHelper.visible = false;
                transformControl.detach();

                renderer.render(scene, camera);

                const dataURL = renderer.domElement.toDataURL('image/png');
                
                gridHelper.visible = prevGrid;
                axesHelper.visible = prevAxes;

                const link = document.createElement('a');
                link.download = `vrm_snapshot_${new Date().getTime()}.png`;
                link.href = dataURL;
                link.click();
                addLog("截图已保存！");
            });
        }

        // 启动应用
        bootstrap();

    </script>
</body>
</html>
