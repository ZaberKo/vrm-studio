<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM 虚拟教师开发工作站 Pro</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #161616;
            --border-color: #262626;
            --accent-color: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #e5e5e5;
            overflow: hidden;
            margin: 0;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        canvas { display: block; outline: none; }

        .panel-glass {
            background: rgba(22, 22, 22, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
        }

        .tab-active {
            border-bottom: 2px solid var(--accent-color);
            color: var(--accent-color);
        }

        #stats-container {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 50;
            pointer-events: none;
        }

        .tree-node:hover { background: rgba(255,255,255,0.05); }
        .tree-node.selected { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        
        .custom-scroll {
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- 顶部导航栏 -->
    <header class="h-12 border-b border-[var(--border-color)] flex items-center justify-between px-4 bg-[var(--panel-color)] z-50">
        <div class="flex items-center gap-2">
            <i data-lucide="cpu" class="w-5 h-5 text-blue-500"></i>
            <span class="font-bold tracking-tight text-sm">VRM TEACHER <span class="text-blue-500">PRO STATION</span></span>
        </div>
        <div class="flex items-center gap-4 text-xs">
            <div id="model-status" class="flex items-center gap-2 text-gray-400">
                <div class="w-2 h-2 rounded-full bg-red-500"></div>
                未加载模型
            </div>
            <div class="flex gap-2">
                <button id="import-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-md transition-colors flex items-center gap-1 cursor-pointer">
                    <i data-lucide="upload" class="w-3 h-3"></i> 导入模型
                </button>
                <button id="screenshot-btn" class="bg-zinc-800 hover:bg-zinc-700 text-white px-3 py-1.5 rounded-md transition-colors flex items-center gap-1 cursor-pointer">
                    <i data-lucide="camera" class="w-3 h-3"></i> 截图
                </button>
            </div>
            <input type="file" id="file-input" class="hidden" accept=".vrm">
            <input type="file" id="vrma-input" class="hidden" accept=".vrma,.glb,.gltf">
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative">
        
        <!-- 左侧面板: 资产与大纲 -->
        <aside class="w-72 border-r border-[var(--border-color)] bg-[var(--panel-color)] flex flex-col z-20">
            <div class="flex border-b border-[var(--border-color)]" id="left-tabs">
                <button data-tab="assets" class="flex-1 py-2 text-[10px] font-bold uppercase tracking-wider tab-active transition-all">资产管理</button>
                <button data-tab="hierarchy" class="flex-1 py-2 text-[10px] font-bold uppercase tracking-wider text-gray-500 hover:text-gray-300 transition-all">场景大纲</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-6 custom-scroll" id="left-content">
                <!-- 资产管理内容 -->
                <div id="tab-assets" class="space-y-6">
                    <section>
                        <h3 class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-3 flex items-center gap-2">
                            <i data-lucide="info" class="w-3 h-3"></i> 模型元数据
                        </h3>
                        <div id="meta-container" class="space-y-2 text-[11px] text-gray-400">
                            请加载 VRM 模型以查看详情
                        </div>
                    </section>

                    <section>
                        <h3 class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-3 flex items-center gap-2">
                            <i data-lucide="layers" class="w-3 h-3"></i> 渲染统计
                        </h3>
                        <div id="render-stats" class="grid grid-cols-2 gap-2 text-[10px] font-mono">
                            <div class="bg-white/5 p-2 rounded">
                                <div class="text-gray-500">TRIS</div>
                                <div id="stat-tris" class="text-blue-400 font-bold">0</div>
                            </div>
                            <div class="bg-white/5 p-2 rounded">
                                <div class="text-gray-500">CALLS</div>
                                <div id="stat-calls" class="text-blue-400 font-bold">0</div>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- 场景大纲内容 -->
                <div id="tab-hierarchy" class="hidden space-y-2 text-[11px]">
                    <div id="hierarchy-tree" class="font-mono">加载模型后显示节点...</div>
                </div>
            </div>
        </aside>

        <!-- 主视口 -->
        <div id="viewport-container" class="flex-1 relative bg-[#0f0f0f]">
            <div id="stats-container"></div>
            
            <!-- 视口工具条 -->
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 panel-glass px-5 py-2.5 rounded-full flex items-center gap-5 z-30 shadow-2xl">
                <button data-cam="front" class="p-1.5 hover:bg-blue-500/20 rounded-full transition-all text-gray-300 hover:text-blue-400" title="正视图"><i data-lucide="layout-template"></i></button>
                <button data-cam="side" class="p-1.5 hover:bg-blue-500/20 rounded-full transition-all text-gray-300 hover:text-blue-400" title="侧视图"><i data-lucide="columns-2"></i></button>
                <button data-cam="face" class="p-1.5 hover:bg-blue-500/20 rounded-full transition-all text-gray-300 hover:text-blue-400" title="面部特写"><i data-lucide="user-circle"></i></button>
                <div class="w-px h-5 bg-zinc-700 mx-1"></div>
                <button id="gizmo-mode" class="p-1.5 hover:bg-orange-500/20 rounded-full transition-all text-gray-300 hover:text-orange-400" title="变换轴模式 (T/R)"><i data-lucide="move"></i></button>
                <button id="reset-pose" class="p-1.5 hover:bg-red-500/20 rounded-full transition-all text-gray-300 hover:text-red-400" title="重置 T-Pose"><i data-lucide="refresh-cw"></i></button>
            </div>

            <!-- 加载进度 -->
            <div id="loading-overlay" class="absolute inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center hidden">
                <div class="w-64 h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                    <div id="loading-bar" class="w-0 h-full bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)] transition-all"></div>
                </div>
                <p class="mt-4 text-[10px] font-bold tracking-[0.2em] text-blue-500 animate-pulse">OPTIMIZING VRM ENVIRONMENT</p>
            </div>
        </div>

        <!-- 右侧面板: 调试实验室 -->
        <aside class="w-80 border-l border-[var(--border-color)] bg-[var(--panel-color)] flex flex-col z-20 overflow-hidden">
            <div class="flex border-b border-[var(--border-color)]" id="right-tabs">
                <button data-tab="expressions" class="flex-1 py-3 text-[10px] font-bold uppercase tracking-wider tab-active transition-all">表情/口型</button>
                <button data-tab="motion" class="flex-1 py-3 text-[10px] font-bold uppercase tracking-wider text-gray-500 hover:text-gray-300 transition-all">动作</button>
                <button data-tab="env" class="flex-1 py-3 text-[10px] font-bold uppercase tracking-wider text-gray-500 hover:text-gray-300 transition-all">环境</button>
            </div>

            <div class="flex-1 overflow-y-auto p-5 custom-scroll" id="right-content">
                <!-- 表情内容 -->
                <div id="tab-expressions" class="space-y-6">
                    <div id="expression-controls" class="space-y-4">
                        <p class="text-xs text-zinc-500 text-center py-20 italic">请加载模型以生成表情控制...</p>
                    </div>
                </div>

                <!-- 动作内容 -->
                <div id="tab-motion" class="hidden space-y-6">
                    <button id="import-vrma" class="w-full border-2 border-dashed border-zinc-700 hover:border-blue-500 py-6 rounded-lg text-xs text-zinc-500 hover:text-blue-400 transition-all flex flex-col items-center gap-2">
                        <i data-lucide="file-video" class="w-6 h-6"></i>
                        导入 .vrma / .glb 动作
                    </button>
                    <div id="animation-player" class="hidden space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] font-bold text-blue-400 uppercase">播放控制器</span>
                            <span id="anim-time" class="text-[10px] font-mono text-zinc-500">00:00</span>
                        </div>
                        <input type="range" id="anim-progress" min="0" max="100" value="0" class="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-blue-500">
                        <div class="flex justify-center gap-4">
                            <button id="anim-play-pause" class="p-2 bg-blue-600 rounded-full hover:bg-blue-500 transition-all"><i data-lucide="play" class="w-4 h-4 text-white"></i></button>
                        </div>
                    </div>
                </div>

                <!-- 环境设置 -->
                <div id="tab-env" class="hidden space-y-6">
                    <section>
                        <h3 class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-4">场景辅助</h3>
                        <div class="space-y-3">
                             <label class="flex items-center justify-between group cursor-pointer">
                                <span class="text-xs text-zinc-400 group-hover:text-white transition-colors">网格地板</span>
                                <input type="checkbox" checked id="grid-toggle" class="w-4 h-4 accent-blue-500">
                            </label>
                            <label class="flex items-center justify-between group cursor-pointer">
                                <span class="text-xs text-zinc-400 group-hover:text-white transition-colors">骨骼可视化</span>
                                <input type="checkbox" id="skeleton-toggle" class="w-4 h-4 accent-blue-500">
                            </label>
                        </div>
                    </section>
                    <section>
                        <h3 class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-4">光影 & 背景</h3>
                        <div class="space-y-4">
                            <div class="space-y-2">
                                <div class="flex justify-between text-[10px] text-zinc-500"><span>环境光强度</span><span id="val-amb-int">1.0</span></div>
                                <input type="range" id="amb-int" min="0" max="3" step="0.1" value="1" class="w-full h-1 bg-zinc-800 rounded-lg accent-blue-500">
                            </div>
                            <div class="space-y-2">
                                <div class="flex justify-between text-[10px] text-zinc-500"><span>背景颜色</span></div>
                                <div class="flex gap-2">
                                    <button class="w-6 h-6 rounded-full border border-white/10 bg-black cursor-pointer" data-color="#000000"></button>
                                    <button class="w-6 h-6 rounded-full border border-white/10 bg-[#00ff00] cursor-pointer" data-color="#00ff00"></button>
                                    <button class="w-6 h-6 rounded-full border border-white/10 bg-[#3b82f6] cursor-pointer" data-color="#3b82f6"></button>
                                    <button class="w-6 h-6 rounded-full border border-white/10 bg-white cursor-pointer" data-color="#ffffff"></button>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </aside>

        <!-- 底部控制台 -->
        <div class="absolute bottom-0 left-72 right-80 h-40 border-t border-[var(--border-color)] bg-[var(--panel-color)] flex flex-col z-40 transition-transform translate-y-32 hover:translate-y-0 duration-300 ease-in-out group" id="console-panel">
            <div class="h-8 w-full flex items-center justify-center cursor-ns-resize bg-zinc-900 border-b border-zinc-800">
                <div class="flex items-center gap-2 text-[9px] font-bold text-zinc-500 uppercase tracking-widest">
                    <i data-lucide="terminal" class="w-3 h-3 text-blue-500"></i>
                    系统日志终端
                </div>
            </div>
            <div class="flex-1 p-3 font-mono text-[10px] overflow-y-auto bg-black/40 custom-scroll" id="console-logs"></div>
        </div>
    </main>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
                "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.0.0/lib/three-vrm.module.js",
                "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3.0.0/lib/three-vrm-animation.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { TransformControls } from 'three/examples/jsm/controls/TransformControls.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
        // 根据官方示例，从独立的包中导入动画插件
        import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from '@pixiv/three-vrm-animation';
        import Stats from 'three/examples/jsm/libs/stats.module.js';

        // --- 全局实例 ---
        let scene, camera, renderer, controls, stats, transformControls, skeletonHelper;
        let currentVRM = null;
        let mixer = null;
        let clock = new THREE.Clock();
        let ambientLight, dirLight;

        // --- 初始化系统 ---
        async function init() {
            lucide.createIcons();
            const container = document.getElementById('viewport-container');

            // 1. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            // 2. Scene & Camera
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 1.4, 3.5);

            // 3. Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 1.1, 0);
            controls.enableDamping = true;

            transformControls = new TransformControls(camera, renderer.domElement);
            transformControls.setMode('rotate'); 
            transformControls.size = 0.5;
            scene.add(transformControls);

            transformControls.addEventListener('dragging-changed', (event) => {
                controls.enabled = !event.value;
            });

            // 4. Lights & Helpers
            ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);

            dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(1, 2, 3);
            dirLight.castShadow = true;
            scene.add(dirLight);

            const grid = new THREE.GridHelper(10, 20, 0x222222, 0x1a1a1a);
            grid.name = "GridHelper";
            scene.add(grid);

            // 5. Stats
            stats = new Stats();
            stats.dom.style.position = 'relative';
            document.getElementById('stats-container').appendChild(stats.dom);

            // 6. Events
            window.addEventListener('resize', onWindowResize);
            setupUIHandlers();
            hookConsole();

            animate();
            log("VRM 核心渲染引擎初始化完成。", "green");
        }

        // --- 核心加载逻辑 ---
        async function loadVRM(url) {
            const loadingBar = document.getElementById('loading-bar');
            document.getElementById('loading-overlay').classList.remove('hidden');
            
            if (currentVRM) {
                scene.remove(currentVRM.scene);
                if (skeletonHelper) scene.remove(skeletonHelper);
                VRMUtils.deepDispose(currentVRM.scene);
                transformControls.detach();
                if (mixer) {
                    mixer.stopAllAction();
                    mixer = null;
                }
                currentVRM = null;
            }

            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));
            loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

            try {
                const gltf = await loader.loadAsync(url, (xhr) => {
                    const prog = (xhr.loaded / xhr.total) * 100;
                    loadingBar.style.width = `${prog}%`;
                });

                const vrm = gltf.userData.vrm;
                currentVRM = vrm;
                scene.add(vrm.scene);

                VRMUtils.rotateVRM0(vrm);

                skeletonHelper = new THREE.SkeletonHelper(vrm.scene);
                skeletonHelper.visible = document.getElementById('skeleton-toggle').checked;
                scene.add(skeletonHelper);

                updateMetadata(vrm.meta);
                updateExpressions(vrm);
                updateHierarchy(vrm.scene);
                document.getElementById('model-status').innerHTML = `<div class="w-2 h-2 rounded-full bg-green-500"></div> ${vrm.meta.name || '已载入'}`;
                
                log(`模型加载就绪: ${vrm.meta.name || 'Unknown'}`, "green");
            } catch (error) {
                log("模型解析失败: " + error.message, "red");
                console.error(error);
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        async function loadVRMA(url) {
            if (!currentVRM) {
                log("请先加载 VRM 模型再导入动作！", "red");
                return;
            }

            const loader = new GLTFLoader();
            loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

            try {
                const gltf = await loader.loadAsync(url);
                const vrmAnimations = gltf.userData.vrmAnimations;

                if (vrmAnimations && vrmAnimations.length > 0) {
                    if (mixer) mixer.stopAllAction();
                    mixer = new THREE.AnimationMixer(currentVRM.scene);
                    
                    // 使用最新的 createVRMAnimationClip 辅助函数创建动画片段
                    const clip = createVRMAnimationClip(vrmAnimations[0], currentVRM);
                    const action = mixer.clipAction(clip);
                    action.play();
                    
                    document.getElementById('animation-player').classList.remove('hidden');
                    log("动作轨道载入成功。", "blue");
                } else {
                    log("文件不含 VRMAnimation 轨道数据。", "yellow");
                }
            } catch (err) {
                log("动作文件载入失败: " + err.message, "red");
                console.error(err);
            }
        }

        function updateExpressions(vrm) {
            const container = document.getElementById('expression-controls');
            container.innerHTML = '<h3 class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-4 flex items-center gap-2"><i data-lucide="smile" class="w-3 h-3"></i> 动态表情面板</h3>';
            
            const mgr = vrm.expressionManager;
            if (!mgr) return;

            const expressions = mgr.expressions;
            expressions.forEach(exp => {
                const item = document.createElement('div');
                item.className = "space-y-2";
                item.innerHTML = `
                    <div class="flex justify-between text-[10px] font-mono text-zinc-400">
                        <span class="uppercase">${exp.expressionName}</span>
                        <span id="val-${exp.expressionName}">0%</span>
                    </div>
                    <input type="range" min="0" max="1" step="0.01" value="0" 
                           class="w-full h-1 bg-zinc-800 rounded-lg appearance-none accent-blue-500 cursor-pointer"
                           data-exp="${exp.expressionName}">
                `;
                const slider = item.querySelector('input');
                slider.oninput = (e) => {
                    const v = parseFloat(e.target.value);
                    document.getElementById(`val-${exp.expressionName}`).innerText = `${Math.round(v*100)}%`;
                    mgr.setValue(exp.expressionName, v);
                };
                container.appendChild(item);
            });
        }

        function updateHierarchy(root) {
            const tree = document.getElementById('hierarchy-tree');
            tree.innerHTML = "";
            
            const createNode = (obj, depth = 0) => {
                const node = document.createElement('div');
                node.className = `tree-node py-1 px-2 cursor-pointer transition-colors flex items-center gap-1 rounded`;
                node.style.paddingLeft = `${depth * 12 + 8}px`;
                
                const isBone = obj.isBone;
                node.innerHTML = `<i data-lucide="${isBone ? 'bone' : 'box'}" class="w-3 h-3 ${isBone ? 'text-orange-400' : 'text-blue-400'}"></i> ${obj.name || obj.type}`;
                
                node.onclick = (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('selected'));
                    node.classList.add('selected');
                    transformControls.attach(obj);
                    log(`选中节点: ${obj.name}`, "blue");
                };

                tree.appendChild(node);
                obj.children.forEach(child => createNode(child, depth + 1));
            };

            createNode(root);
            lucide.createIcons();
        }

        function updateMetadata(meta) {
            const container = document.getElementById('meta-container');
            const data = [
                { k: "名称", v: meta.name },
                { k: "作者", v: meta.authors?.join(', ') || meta.author },
                { k: "版本", v: meta.version },
                { k: "规范", v: `VRM ${meta.specVersion || '0.0'}` }
            ];
            container.innerHTML = data.map(i => `
                <div class="flex justify-between border-b border-white/5 pb-1">
                    <span class="text-zinc-600">${i.k}</span>
                    <span class="text-zinc-300 font-medium truncate ml-2">${i.v || '-'}</span>
                </div>
            `).join('');
        }

        function setupUIHandlers() {
            const setupTabs = (tabRoot, contentRoot) => {
                const btns = document.getElementById(tabRoot).querySelectorAll('button');
                const contents = document.getElementById(contentRoot).children;
                btns.forEach(btn => {
                    btn.onclick = () => {
                        btns.forEach(b => b.classList.remove('tab-active'));
                        btn.classList.add('tab-active');
                        Array.from(contents).forEach(c => c.classList.add('hidden'));
                        const target = document.getElementById(`tab-${btn.dataset.tab}`);
                        if (target) target.classList.remove('hidden');
                    };
                });
            };
            setupTabs('left-tabs', 'left-content');
            setupTabs('right-tabs', 'right-content');

            document.getElementById('import-btn').onclick = () => document.getElementById('file-input').click();
            document.getElementById('file-input').onchange = (e) => {
                const file = e.target.files[0];
                if (file) loadVRM(URL.createObjectURL(file));
            };

            document.getElementById('import-vrma').onclick = () => document.getElementById('vrma-input').click();
            document.getElementById('vrma-input').onchange = (e) => {
                const file = e.target.files[0];
                if (file) loadVRMA(URL.createObjectURL(file));
            };

            document.querySelectorAll('[data-cam]').forEach(btn => {
                btn.onclick = () => {
                    const mode = btn.dataset.cam;
                    if (mode === 'front') camera.position.set(0, 1.4, 3);
                    else if (mode === 'side') camera.position.set(2, 1.4, 0);
                    else if (mode === 'face') camera.position.set(0, 1.4, 0.8);
                    controls.target.set(0, 1.2, 0);
                    log(`切换相机: ${mode}`, "gray");
                };
            });

            document.getElementById('grid-toggle').onchange = (e) => {
                const grid = scene.getObjectByName("GridHelper");
                if (grid) grid.visible = e.target.checked;
            };
            document.getElementById('skeleton-toggle').onchange = (e) => { 
                if (skeletonHelper) skeletonHelper.visible = e.target.checked; 
            };
            document.getElementById('gizmo-mode').onclick = () => {
                const mode = transformControls.mode === 'rotate' ? 'translate' : 'rotate';
                transformControls.setMode(mode);
                log(`Gizmo 模式: ${mode}`, "yellow");
            };

            document.getElementById('amb-int').oninput = (e) => {
                const v = parseFloat(e.target.value);
                ambientLight.intensity = v;
                document.getElementById('val-amb-int').innerText = v.toFixed(1);
            };

            document.querySelectorAll('[data-color]').forEach(btn => {
                btn.onclick = () => {
                    const color = btn.dataset.color;
                    renderer.setClearColor(color, 1);
                    scene.background = new THREE.Color(color);
                };
            });

            document.getElementById('screenshot-btn').onclick = () => {
                const link = document.createElement('a');
                link.download = `vrm_capture_${Date.now()}.png`;
                link.href = renderer.domElement.toDataURL("image/png");
                link.click();
                log("高清截图已生成并下载。", "green");
            };

            document.getElementById('reset-pose').onclick = () => {
                if (currentVRM) {
                    currentVRM.humanoid.resetPose();
                    log("已重置为 T-Pose。", "yellow");
                }
            };
        }

        function onWindowResize() {
            const container = document.getElementById('viewport-container');
            if (!container) return;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function hookConsole() {
            const logEl = document.getElementById('console-logs');
            window.log = (msg, color = 'gray') => {
                const div = document.createElement('div');
                const colors = { red: 'text-red-500', green: 'text-green-400', blue: 'text-blue-400', yellow: 'text-orange-400', gray: 'text-zinc-500' };
                div.className = colors[color] || colors.gray;
                div.innerHTML = `<span class="opacity-50 text-[8px]">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
                logEl.appendChild(div);
                logEl.scrollTop = logEl.scrollHeight;
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (currentVRM) {
                currentVRM.update(delta);
            }
            if (mixer) {
                mixer.update(delta);
                const player = document.getElementById('animation-player');
                if (!player.classList.contains('hidden')) {
                    const action = mixer._actions[0];
                    if (action && action._clip) {
                        const prog = (mixer.time % action._clip.duration) / action._clip.duration * 100;
                        document.getElementById('anim-progress').value = prog;
                        document.getElementById('anim-time').innerText = mixer.time.toFixed(1) + "s";
                    }
                }
            }

            controls.update();
            renderer.render(scene, camera);
            stats.update();

            if (Math.round(clock.elapsedTime * 10) % 5 === 0) {
                document.getElementById('stat-tris').innerText = renderer.info.render.triangles.toLocaleString();
                document.getElementById('stat-calls').innerText = renderer.info.render.calls;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
